<!DOCTYPE html>
<html lang="pt-br">

<head>

  <meta charset="UTF-8">

  <meta name="viewport"
    content="width=device-width, initial-scale=1.0">

  <title>FinanJovem</title>

  <link rel="stylesheet"
    href="style.css">

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

  <div class="container">

    <h1>💰 FinanJovem</h1>

    <p>Controle sua vida financeira</p>

    <input type="number"
      id="ganhos"
      placeholder="Quanto você ganha">

    <input type="number"
      id="gastos"
      placeholder="Quanto você gasta">

    <input type="number"
      id="meta"
      placeholder="Meta de economia">

    <button onclick="calcular()">
      Calcular
    </button>

    <div id="resultado"></div>

    <div class="meta">

      <h3>🎯 Progresso da Meta</h3>

      <div class="barra">

        <div class="progresso"
          id="progresso">
          0%
        </div>

      </div>

    </div>

    <canvas id="grafico"></canvas>

    <div class="dicas">

      <h2>💡 Como Economizar</h2>

      <ul>

        <li>✅ Evite gastos desnecessários</li>

        <li>✅ Guarde parte do dinheiro</li>

        <li>✅ Faça metas financeiras</li>

        <li>✅ Controle gastos com lazer</li>

        <li>✅ Planeje suas compras</li>

      </ul>

    </div>

  </div>

  <script src="script.js"></script>

</body>
</html>
